<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Scheme Generator</title>
  </head>
  <body>
    <div id="app">
      <header>
        <nav>
          <h1>Color Scheme Generator</h1>
          <button id="theme-toggle" aria-label="Switch to dark mode"></button>
        </nav>
      </header>
      <main>
        <section class="actions container">
          <label for="seed-color" class="sr-only">Please select a color</label>
          <input type="color" id="seed-color" value="#3D4B7A" />
          <label for="mode-select" class="sr-only">Please select a mode</label>
          <select name="mode" id="mode-select">
            <!-- Options will be rendered by JavaScript -->
          </select>
          <button id="get-scheme-btn">Get Color Scheme</button>
        </section>
        <section
          class="results container"
          aria-live="polite"
          aria-label="Color scheme results"
        >
          <button
            class="color-column"
            aria-label="Color 1: #333333. Click to copy hex code."
          >
            <span class="color-hex" aria-hidden="true">#333333</span>
          </button>
          <button
            class="color-column"
            aria-label="Color 1: #333333. Click to copy hex code."
          >
            <span class="color-hex" aria-hidden="true">#333333</span>
          </button>
          <button
            class="color-column"
            aria-label="Color 1: #333333. Click to copy hex code."
          >
            <span class="color-hex" aria-hidden="true">#333333</span>
          </button>
          <button
            class="color-column"
            aria-label="Color 1: #333333. Click to copy hex code."
          >
            <span class="color-hex" aria-hidden="true">#333333</span>
          </button>
          <button
            class="color-column"
            aria-label="Color 1: #333333. Click to copy hex code."
          >
            <span class="color-hex" aria-hidden="true">#333333</span>
          </button>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
